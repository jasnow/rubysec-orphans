---
gem: will_paginate
url: TBD
title: Security vulnerability when generating pagination URLs in Rails
date: 2016-02-17
description: |
  will_paginate (versions prior to 3.1.1 and 3.0.8) contain a
  denial-of-service vulnerability triggered by extremely large `page`
  parameters. When a user supplies a very large page number, the library
  attempts to calculate offsets and ranges that cause excessive memory
  allocation and CPU usage.

  This can allow an attacker to degrade application performance or cause
  resource exhaustion by repeatedly requesting pages with huge numeric values.

  The issue was fixed in versions 3.1.1 and 3.0.8 by clamping page
  numbers to reasonable bounds and preventing pathological calculations.
  Additional hardening was released in 3.1.2 and 3.0.9.
patched_versions:
  - "~> 3.0.9"
  - ">= 3.1.2"
