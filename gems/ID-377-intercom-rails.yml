url: https://security.snyk.io/vuln/SNYK-RUBY-INTERCOMRAILS-20379
title: XSS vulnerability if a user has dangerous values in setting script
date: 2013-02-05
description: |
  ## Summary

  Fix potential XSS vulnerability if a user has dangerous values in their data.

  intercom-rails is a Rails helper for emitting JavaScript tags
  that integrate Intercom into an application.

  ## XSS Definition

  A cross-site scripting (XSS) vulnerability existed in how user data
  was embedded into the generated JavaScript snippet.
  User-controlled attributes (such as a user's email address or other
  account fields) were interpolated into JavaScript without proper
  sanitization.
  An attacker able to set these fields to crafted values containing
  HTML or JavaScript could trigger arbitrary script execution in the
  context of affected applications' users' browsers.
  This could lead to session theft, defacement, or other client-side
  attacks depending on application context.

  FYI: cwe: CWE-79
